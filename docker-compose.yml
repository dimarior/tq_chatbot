services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tq
      POSTGRES_PASSWORD: tq
      POSTGRES_DB: tq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tq -d tq"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama corre nativo en macOS (Ollama.app) para usar Metal/GPU.
  # Docker Desktop no expone el GPU de Apple Silicon a contenedores;
  # con Ollama nativo, qwen3:8b va de ~1 tok/s (CPU) a ~30-50 tok/s (Metal).
  # El contenedor del api accede al host vía host.docker.internal:11434.
  # Para volver a Ollama dockerizado: restaurar servicios `ollama` y `ollama-init`
  # del git history y cambiar OLLAMA_HOST a http://ollama:11434.

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      DATABASE_URL: postgresql://tq:tq@postgres:5432/tq
      LLM_MODEL: ${LLM_MODEL:-qwen3:8b}
      # Fijado a ollama: la imagen del API no incluye sentence-transformers/torch.
      # Los scripts de ingesta en host SÍ usan sentence-transformers vía .env (más rápido en batch).
      # Ambos backends cargan el mismo Qwen3-Embedding-0.6B → vectores compatibles bajo coseno.
      EMBED_BACKEND: ollama
      EMBED_MODEL: qwen3-embedding:0.6b
      EMBED_DIMS: ${EMBED_DIMS:-1024}
      TOP_K: ${TOP_K:-6}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./apps:/app/apps:ro
      - ./frontend:/app/frontend:ro

volumes:
  postgres_data:
  ollama_data:
