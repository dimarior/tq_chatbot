services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tq
      POSTGRES_PASSWORD: tq
      POSTGRES_DB: tq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tq -d tq"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama corre nativo en macOS (Ollama.app) para usar Metal/GPU.
  # Docker Desktop no expone el GPU de Apple Silicon a contenedores;
  # con Ollama nativo, qwen3:8b va de ~1 tok/s (CPU) a ~30-50 tok/s (Metal).
  # El contenedor del api accede al host vía host.docker.internal:11434.
  # Para volver a Ollama dockerizado: restaurar servicios `ollama` y `ollama-init`
  # del git history y cambiar OLLAMA_HOST a http://ollama:11434.

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      DATABASE_URL: postgresql://tq:tq@postgres:5432/tq
      LLM_MODEL: ${LLM_MODEL:-qwen3:8b}
      LLM_ROUTER_MODEL: ${LLM_ROUTER_MODEL:-}
      EMBED_MODEL: ${EMBED_MODEL:-qwen3-embedding:0.6b}
      TOP_K: ${TOP_K:-6}
      MIN_SCORE: ${MIN_SCORE:-0.40}
      CHROMA_PATH: ${CHROMA_PATH:-./chroma_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000,http://localhost:3000}
      # LangSmith tracing — el grafo emite traces sólo cuando ambos están seteados.
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-tq-chatbot}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    ports:
      - "8000:8000"
    volumes:
      - ./apps:/app/apps:ro
      # Persist directory de Chroma — se monta para que el API contenedorizado
      # vea los chunks que el host indexó con scripts/ingest_to_rag.py.
      - ./chroma_db:/app/chroma_db

volumes:
  postgres_data:
